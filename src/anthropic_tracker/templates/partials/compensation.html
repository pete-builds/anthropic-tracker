<h2>Compensation Ranges</h2>
{% if compensation %}
<div class="chart-container" style="height:{{ [compensation|length * 40, 120] | max }}px">
  <canvas id="compChart"></canvas>
</div>
<script>
(function() {
  const ctx = document.getElementById('compChart');
  if (!ctx) return;
  const data = {{ compensation | tojson }};
  const labels = data.map(c => c.department);
  if (window._compChart) window._compChart.destroy();
  window._compChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Min', data: data.map(c => c.min / 1000), backgroundColor: 'rgba(124,110,240,0.3)', borderColor: '#7c6ef0', borderWidth: 1, borderRadius: 3 },
        { label: 'Avg Mid', data: data.map(c => c.avg / 1000), backgroundColor: 'rgba(78,205,196,0.5)', borderColor: '#4ecdc4', borderWidth: 1, borderRadius: 3 },
        { label: 'Max', data: data.map(c => c.max / 1000), backgroundColor: 'rgba(255,107,107,0.3)', borderColor: '#ff6b6b', borderWidth: 1, borderRadius: 3 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#aaa', boxWidth: 10, font: { size: 10 } } },
        tooltip: { callbacks: { label: function(c) { return c.dataset.label + ': $' + (c.raw * 1000).toLocaleString(); } } }
      },
      scales: {
        x: { ticks: { color: '#888', callback: v => '$' + v + 'K' }, grid: { color: '#1e1e1e' } },
        y: { ticks: { color: '#ccc', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
})();
</script>
{% else %}
<div class="empty-state">
  <p class="muted">No compensation data yet.</p>
  <p class="muted">Run <code>tracker fetch --with-salary</code> to parse salary ranges.</p>
</div>
{% endif %}
